name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Build EXE
        run: uv run --with pyinstaller pyinstaller --onefile --noconsole --name TransparentBuildings gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TransparentBuildings
          path: dist/TransparentBuildings.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TransparentBuildings.exe
          generate_release_notes: true
